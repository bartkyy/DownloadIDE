<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>IDE</title>
  <style>
    body, html { margin: 0; padding: 0; height: 100%; display: flex; flex-direction: column; background: #1e1e1e; color: #eee; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    #toolbar { background: #2d2d2d; padding: 5px; display: flex; gap: 10px; border-bottom: 1px solid #333; }
    #main { display: flex; flex: 1; overflow: hidden; }
    #sidebar { width: 250px; background: #252526; border-right: 1px solid #333; overflow-y: auto; padding: 10px; font-size: 13px; }
    #editor-container { flex: 1; display: flex; flex-direction: column; }
    #tabs { display: flex; background: #252526; overflow-x: auto; height: 35px; }
    .tab { padding: 8px 15px; background: #2d2d2d; border-right: 1px solid #1e1e1e; cursor: pointer; font-size: 12px; display: flex; align-items: center; }
    .tab.active { background: #1e1e1e; color: #007acc; border-top: 1px solid #007acc; }
    #monaco-editor { flex: 1; }
    .file-item { padding: 4px; cursor: pointer; white-space: nowrap; }
    .file-item:hover { background: #37373d; }
    button { background: #0e639c; color: white; border: none; padding: 4px 10px; cursor: pointer; font-size: 12px; }
    button:hover { background: #1177bb; }
    .tab { position: relative; padding-right: 30px; }
    .close-tab { position: absolute; right: 5px; top: 50%; transform: translateY(-50%); width: 16px; height: 16px; text-align: center; line-height: 16px; border-radius: 2px; font-size: 10px; color: #aaa;}
    .close-tab:hover { background: #444; color: white; }
  </style>
</head>
<body>
  <div id="toolbar">
  <button onclick="triggerOpen()">Otwórz Plik</button>
  <button onclick="triggerOpenFolder()">Otwórz Folder</button> <!-- Nowe -->
  <button onclick="triggerSave()">Zapisz (Ctrl+S)</button>
</div>
  <div id="main">
    <div id="sidebar">
      <div style="margin-bottom: 10px; opacity: 0.6; font-weight: bold;">EXPLORER</div>
      <div id="file-tree">Ładowanie plików...</div>
    </div>
    <div id="editor-container">
      <div id="tabs"></div>
      <div id="monaco-editor"></div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.36.1/min/vs/loader.min.js"></script>
  <script src="renderer.js"></script>
</body>
</html>
