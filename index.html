<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>IDE</title>
  <style>
    body, html {margin: 0; padding: 0; height: 100%;display: flex; flex-direction: column;background: #1e1e1e; color: #eee;font-family: 'Segoe UI', sans-serif;overflow: hidden;}
    #toolbar {background: #2d2d2d; height: 30px;display: flex; align-items: center;padding: 0 10px; border-bottom: 1px solid #333;font-size: 12px; opacity: 0.8;}
    #main {display: flex;flex: 1; overflow: hidden;}
    #sidebar {width: 250px;min-width: 150px;max-width: 500px;background: #252526;border-right: 1px solid #333;overflow-y: auto;padding: 10px;font-size: 13px;flex-shrink: 0;}
    #resizer { width: 5px; background: #333;cursor: col-resize;z-index: 10;}
    #resizer:hover { background: #555; }
    #editor-container {flex: 1;display: flex;flex-direction: column;min-width: 0;}
    #tabs {display: flex;background: #252526;height: 35px;overflow-x: auto;overflow-y: hidden;white-space: nowrap;}
    .tab {padding: 8px 15px; background: #2d2d2d;border-right: 1px solid #1e1e1e; cursor: pointer;font-size: 12px; display: flex; align-items: center;position: relative; padding-right: 30px;}
    .tab.active { background: #1e1e1e; color: #007acc; border-top: 1px solid #007acc; }
    #monaco-editor { flex: 1; }
    #bottom-panel { display: none;height: 150px;background: #1e1e1e;border-top: 1px solid #333;color: #ccc;padding: 10px;overflow-y: auto;font-family: 'Consolas', monospace;font-size: 12px;}
    .file-item { padding: 4px; cursor: pointer; white-space: nowrap; }
    .file-item:hover { background: #37373d; }
    .close-tab {position: absolute; right: 5px; top: 50%;transform: translateY(-50%); width: 16px;height: 16px; text-align: center;line-height: 16px; border-radius: 2px;font-size: 10px; color: #aaa;}
    .close-tab:hover { background: #444; color: white; }
  </style>
</head>
<body>
  <div id="main">
    <div id="sidebar">
      <div style="margin-bottom: 10px; opacity: 0.6; font-weight: bold; font-size: 11px; letter-spacing: 1px;">EXPLORER</div>
      <div id="file-tree">Ładowanie plików...</div>
    </div>
    <div id="resizer"></div>
    <div id="editor-container">
      <div id="tabs"></div>
      <div id="monaco-editor"></div>
    </div>
  </div>
  <div id="bottom-panel" style="display: none; height: 150px; background: #1e1e1e; border-top: 1px solid #333; color: #ccc; padding: 10px; overflow-y: auto;">
  <div style="font-weight: bold; margin-bottom: 5px;">Wynik kompilacji:</div>
  <div id="console-output" style="white-space: pre-wrap; font-family: monospace;"></div>
  </div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.36.1/min/vs/loader.min.js"></script>
  <script src="renderer.js"></script>
</body>
</html>
